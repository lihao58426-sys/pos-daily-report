# ==========================================
# POS 日报推送 - 配置文件
# ==========================================
#
# 🔐 敏感信息通过环境变量注入（不写在文件里）：
#     总店: POS_ACCOUNT / POS_PASSWORD
#     分店: POS_ACCOUNT_2 / POS_PASSWORD_2
#     企微 Webhook: WEWORK_WEBHOOK_URL
#
#     Windows: setx POS_ACCOUNT "账号"
#     Mac/Linux: export POS_ACCOUNT="账号"
# ==========================================

# ── 门店列表 ──
# 只有一个店就保留一项，开分店了在下面加
stores:
  - id: "xianyang"
    name: "咸阳总店"
    account_env: "POS_ACCOUNT"        # 环境变量名
    password_env: "POS_PASSWORD"
  # - id: "xian"
  #   name: "西安分店"
  #   account_env: "POS_ACCOUNT_2"
  #   password_env: "POS_PASSWORD_2"

# ── 推送方式 ──
push:
  method: "wework_bot"

# ── 运行模式 ──
run:
  headless: false
  timeout: 30000
  min_delay: 1.0      # 每次操作间随机停顿（秒）
  max_delay: 3.0
